name: Run Gmail Translator

on:
  schedule:
    - cron: '0 * * * *'  # every hour at minute 0
  workflow_dispatch:
    inputs:
      llm_provider:
        description: LLM provider to use for this run
        required: true
        default: openai
        type: choice
        options:
          - openai
          - deepseek
      test_subject_contains:
        description: Optional subject text to test a specific email
        required: false
        default: ""
        type: string
      test_from:
        description: Optional sender email to narrow a test run
        required: false
        default: ""
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ inputs.llm_provider || vars.LLM_PROVIDER || 'openai' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-3.5-turbo' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      TEST_SUBJECT_CONTAINS: ${{ inputs.test_subject_contains || vars.TEST_SUBJECT_CONTAINS || '' }}
      TEST_FROM: ${{ inputs.test_from || vars.TEST_FROM || '' }}
      TEST_FORWARD_TO: ${{ vars.TEST_FORWARD_TO || 'baskalter@hotmail.com' }}
      TEST_MARK_READ: ${{ vars.TEST_MARK_READ || 'false' }}
      TRANSLATION_MAX_RETRIES: ${{ vars.TRANSLATION_MAX_RETRIES || '3' }}
      TRANSLATION_RETRY_DELAY_SECONDS: ${{ vars.TRANSLATION_RETRY_DELAY_SECONDS || '20' }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore token.json from secret
        run: echo "$GOOGLE_TOKEN" > token.json
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}

      - name: Restore credentials.json from secret
        run: echo "$GOOGLE_CREDS" > credentials.json
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}

      - name: Create .env file for LLM provider
        run: |
          cat <<EOF > .env
          LLM_PROVIDER=${{ env.LLM_PROVIDER }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ env.OPENAI_MODEL }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL=${{ env.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL=${{ env.DEEPSEEK_BASE_URL }}
          TEST_SUBJECT_CONTAINS=${{ env.TEST_SUBJECT_CONTAINS }}
          TEST_FROM=${{ env.TEST_FROM }}
          TEST_FORWARD_TO=${{ env.TEST_FORWARD_TO }}
          TEST_MARK_READ=${{ env.TEST_MARK_READ }}
          TRANSLATION_MAX_RETRIES=${{ env.TRANSLATION_MAX_RETRIES }}
          TRANSLATION_RETRY_DELAY_SECONDS=${{ env.TRANSLATION_RETRY_DELAY_SECONDS }}
          EOF

      - name: Run Gmail translator script
        run: python -u translatorv2.py
