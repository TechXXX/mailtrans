name: Run Gmail Translator

on:
  schedule:
    - cron: '0 8 * * *'  # runs daily at 08:00 UTC
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore token.json from secret
        run: echo "$GOOGLE_TOKEN" > token.json
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}

      - name: Restore credentials.json from secret
        run: echo "$GOOGLE_CREDS" > credentials.json
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}

      - name: Create .env file with OpenAI key
        run: echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env

      - name: Run Gmail translator script
        run: python translatorv2.py
