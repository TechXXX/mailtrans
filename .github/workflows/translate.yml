name: Run Gmail Translator

on:
  schedule:
    - cron: '0 * * * *'  # every hour at minute 0
  workflow_dispatch:
    inputs:
      llm_provider:
        description: LLM provider to use for this run
        required: true
        default: openai
        type: choice
        options:
          - openai
          - deepseek

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ inputs.llm_provider || vars.LLM_PROVIDER || 'openai' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-3.5-turbo' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore token.json from secret
        run: echo "$GOOGLE_TOKEN" > token.json
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}

      - name: Restore credentials.json from secret
        run: echo "$GOOGLE_CREDS" > credentials.json
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}

      - name: Create .env file for LLM provider
        run: |
          cat <<EOF > .env
          LLM_PROVIDER=${{ env.LLM_PROVIDER }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ env.OPENAI_MODEL }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL=${{ env.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL=${{ env.DEEPSEEK_BASE_URL }}
          EOF

      - name: Run Gmail translator script
        run: python translatorv2.py
